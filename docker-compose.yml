services:
  portfolio:
    image: iamthewraith/portfolio:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_TURNSTILE_SITE_KEY: ${PUBLIC_TURNSTILE_SITE_KEY}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
